name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly test to check new Node versions

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 24      # Minimum supported: 24.15+ exports node::crypto::GetSSLCtx
          - latest  # Full fidelity (cert compression) from 26.4

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          check-latest: true

      - run: node -e "console.log('Node', process.version, '| OpenSSL', process.versions.openssl)"

      - run: npm ci --ignore-scripts

      # Build the shipped artifact (a --napi prebuild) and prove it loads and
      # works before running the suite against it.
      - run: npm run prebuild
      - run: npm run test:smoke

      - run: npm run build:ts
      - run: npm test

  prebuild:
    name: prebuild (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64-glibc,   runs-on: ubuntu-latest }
          - { name: linux-arm64-glibc, runs-on: ubuntu-24.04-arm }
          - { name: darwin-x64,        runs-on: macos-15-intel }
          - { name: darwin-arm64,      runs-on: macos-latest }
          - { name: win32-x64,         runs-on: windows-latest }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci --ignore-scripts
      - run: npm run prebuild
      - run: npm run test:smoke
      - run: tar -czf prebuilds-${{ matrix.name }}.tar.gz prebuilds
      - uses: actions/upload-artifact@v7
        with:
          name: prebuilds-${{ matrix.name }}
          path: prebuilds-${{ matrix.name }}.tar.gz

  # Prove the single linux-x64 prebuild loads across the whole supported Node
  # range (24.15+), not just the Node it was built with.
  smoke-across-node:
    name: smoke (node ${{ matrix.node-version }}, reuse prebuild)
    needs: prebuild
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [24, 26, latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v8
        with:
          name: prebuilds-linux-x64-glibc
      - run: tar -xzf prebuilds-linux-x64-glibc.tar.gz
      - run: npm run test:smoke

  publish:
    name: Publish to npm
    needs: [test, prebuild, smoke-across-node]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/tls-impersonate
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (tokenless OIDC) needs npm >= 11.5.1.
      - run: npm install -g npm@latest

      - run: npm ci --ignore-scripts

      - uses: actions/download-artifact@v8
        with:
          pattern: prebuilds-*
          path: artifacts
          merge-multiple: true
      - run: for f in artifacts/*.tar.gz; do tar -xzf "$f"; done
      - run: ls -R prebuilds

      - name: Verify tag matches package.json version
        id: version-check
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Error: Tag version (v$TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "✓ Tag version matches package.json version: $PACKAGE_VERSION"

          # Check if version matches strict X.Y.Z format (stable release)
          if echo "$PACKAGE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Stable release version detected: $PACKAGE_VERSION"
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "Prerelease version detected: $PACKAGE_VERSION"
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        run: |
          if [ "${{ steps.version-check.outputs.is_prerelease }}" == "true" ]; then
            echo "Publishing untagged prerelease"
            npm stage publish --provenance --tag test
            # We have to publish with a tag (so we use 'test') but we can clean it up:
            npm dist-tag rm tls-impersonate test --silent
          else
            echo "Publishing stable release with 'latest' tag"
            npm stage publish --provenance
          fi
