name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # Weekly test to check new Node versions

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 24      # Minimum supported: 24.15+ exports node::crypto::GetSSLCtx
          - latest  # Full fidelity (cert compression) from 26.4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          check-latest: true

      - name: Node version
        run: node --version
      - name: OpenSSL version
        run: node -e "console.log('OpenSSL', process.versions.openssl)"

      - run: npm ci
      - run: npm run build
      - run: npm test
